spring:
  datasource:
    url: jdbc:sqlite:project_pa.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always # Questo serve a caricare lo schema ogni volta che avvii

mybatis:
  mapper-locations: classpath:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true # Converte db_user in dbUser in automatico